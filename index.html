<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Nandwani Interio — QR</title>
<style>
  :root{
    --red:#e11d2a; --charcoal:#1c1c1e; --ink:#2a2a2e; --muted:#8a8a90;
    --line:#e7e7ea; --bg:#f5f5f4; --card:#ffffff; --ok:#0a7d3b;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg); color:var(--ink); -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:960px;margin:0 auto;padding:20px 16px 80px}

  header.top{display:flex;align-items:center;gap:14px;padding:18px 0 22px;justify-content:space-between}
  header.top .l{display:flex;align-items:center;gap:14px}
  header.top img{height:54px;width:auto}
  header.top .t{font-size:13px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase}
  .gearbtn{border:1px solid var(--line);background:#fff;border-radius:10px;padding:9px 14px;font-size:13px;font-weight:600;cursor:pointer;color:var(--ink)}
  .gearbtn:hover{border-color:var(--red);color:var(--red)}

  .panel{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px 18px 20px;margin-bottom:22px}
  .panel h2{margin:0 0 14px;font-size:15px;letter-spacing:.02em;text-transform:uppercase;color:var(--charcoal)}
  .row{display:flex;gap:12px;flex-wrap:wrap}
  .field{flex:1;min-width:160px;margin-bottom:12px}
  label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;letter-spacing:.03em;text-transform:uppercase}
  input,select{
    width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:9px;
    font-size:15px;background:#fafafa;color:var(--ink);outline:none;transition:.12s
  }
  input:focus,select:focus{border-color:var(--red);background:#fff}
  select:disabled{opacity:.5}
  .hintline{font-size:12px;color:var(--muted);margin:-6px 0 12px}

  .ranges{margin-top:6px}
  .rangehdr{display:flex;justify-content:space-between;align-items:center;margin:6px 0 8px}
  .rangehdr span{font-size:12px;color:var(--muted);letter-spacing:.04em;text-transform:uppercase}
  .rrow{display:grid;grid-template-columns:1.3fr 1fr 34px;gap:8px;margin-bottom:8px;align-items:center}
  .rrow input{padding:9px 10px;font-size:14px}
  .crow{display:grid;grid-template-columns:1fr 1fr 1fr 34px;gap:8px;margin-bottom:8px;align-items:center}
  .crow input,.crow select{padding:9px 10px;font-size:14px}
  .rmv{border:none;background:#f1f1f2;color:#b02;border-radius:8px;height:38px;cursor:pointer;font-size:18px;line-height:1}
  .rmv:hover{background:#fbe3e5}
  .btn{border:none;border-radius:9px;padding:11px 18px;font-size:14px;font-weight:600;cursor:pointer;letter-spacing:.02em}
  .btn.primary{background:var(--red);color:#fff}
  .btn.primary:hover{filter:brightness(1.05)}
  .btn.ghost{background:#f1f1f2;color:var(--ink)}
  .btn.ghost:hover{background:#e7e7ea}
  .btn.tiny{padding:7px 12px;font-size:12.5px}
  .addrange{background:none;border:1px dashed var(--line);color:var(--muted);border-radius:9px;padding:9px;width:100%;cursor:pointer;font-size:13px}
  .addrange:hover{border-color:var(--red);color:var(--red)}
  .formfoot{display:flex;gap:10px;margin-top:6px;align-items:center}
  .msg{font-size:13px;color:var(--red)}
  .msg.ok{color:var(--ok)}

  .brandgroup{margin-bottom:26px}
  .brandname{font-size:13px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--red);margin:0 0 10px 2px}
  .fcard{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:10px}
  .fcard .fn{font-size:16px;font-weight:600}
  .fcard .fmeta{font-size:12.5px;color:var(--muted);margin-top:3px}
  .fcard .acts{display:flex;gap:8px;flex-shrink:0}
  .empty{color:var(--muted);font-size:14px;text-align:center;padding:30px}

  .selbar{
    position:fixed;left:0;right:0;bottom:0;background:var(--charcoal);color:#fff;
    padding:14px 18px;display:flex;align-items:center;justify-content:center;gap:14px;
    box-shadow:0 -4px 16px rgba(0,0,0,.18);z-index:40;flex-wrap:wrap
  }
  .selbar .cnt{font-size:14px}
  .selbar .btn.primary{background:var(--red)}
  .selbar .btn.ghost{background:#3a3a3d;color:#fff}
  .selbar .btn.ghost:hover{background:#48484c}

  .overlay{position:fixed;inset:0;background:rgba(20,20,22,.55);display:none;align-items:center;justify-content:center;padding:16px;z-index:50}
  .overlay.on{display:flex}
  .modal{background:#fff;border-radius:16px;max-width:520px;width:100%;padding:20px;text-align:center;max-height:92vh;overflow:auto;position:relative}
  .modal.wide{max-width:640px;text-align:left}
  .modal h3{margin:0 0 4px;font-size:17px}
  .modal .sub{font-size:13px;color:var(--muted);margin-bottom:16px}
  .cardprev{border:1px solid var(--line);border-radius:12px;overflow:hidden;margin:0 auto 16px;background:#fff;max-width:420px}
  .cardprev img{width:100%;display:block}
  .modal .mfoot{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
  .hint{font-size:12px;color:var(--muted);margin-top:14px;line-height:1.5}
  .close{position:absolute;top:14px;right:16px;font-size:24px;color:#999;cursor:pointer;background:none;border:none}

  /* settings modal */
  .tabbar{display:flex;gap:6px;margin-bottom:16px;border-bottom:1px solid var(--line)}
  .tabbtn{border:none;background:none;padding:10px 14px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent}
  .tabbtn.on{color:var(--red);border-color:var(--red)}
  .cfgrow{display:flex;gap:8px;align-items:center;margin-bottom:8px}
  .cfgrow input{flex:1}
  .cfglist{max-height:220px;overflow:auto;border:1px solid var(--line);border-radius:10px;padding:6px}
  .cfgitem{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-radius:8px}
  .cfgitem:hover{background:#fafafa}
  .cfgitem .nm{font-size:14px}
  .cfgitem .acts button{margin-left:6px}
  .addnew{display:flex;gap:8px;margin:12px 0}
  .addnew input{flex:1}
  .brandprods{margin-top:14px;padding-top:14px;border-top:1px solid var(--line)}
  .brandprods .lbl{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.03em;margin-bottom:8px}
  .chkgrid{display:grid;grid-template-columns:1fr 1fr;gap:6px 12px;max-height:220px;overflow:auto}
  .chkgrid label{display:flex;align-items:center;gap:8px;font-size:13.5px;text-transform:none;letter-spacing:0;color:var(--ink);cursor:pointer}
  .chkgrid input{width:16px;height:16px;padding:0}

  .viewer{max-width:560px;margin:0 auto;padding:26px 18px 60px}
  .vlogo{text-align:center;margin-bottom:22px}
  .vlogo img{height:64px;width:auto}
  .vhead{text-align:center;margin-bottom:22px}
  .vbrand{font-size:12.5px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--red)}
  .vfile{font-size:26px;font-weight:700;margin-top:4px;color:var(--charcoal)}
  .vsub{font-size:14px;color:var(--muted);margin-top:4px}
  table.rates{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06)}
  table.rates th{background:var(--charcoal);color:#fff;font-size:11px;letter-spacing:.06em;text-transform:uppercase;padding:12px 12px;text-align:left;font-weight:600}
  table.rates td{padding:13px 12px;border-top:1px solid var(--line);font-size:15px}
  table.rates td.rate{font-weight:700;color:var(--charcoal);white-space:nowrap}
  table.rates tr:nth-child(even) td{background:#fafafa}
  .vfoot{text-align:center;font-size:12px;color:var(--muted);margin-top:26px}
  .notfound{text-align:center;padding:60px 20px;color:var(--muted)}
  .notfound b{color:var(--charcoal);display:block;font-size:18px;margin-bottom:6px}

  @media (max-width:560px){
    .rrow{grid-template-columns:1fr 1fr}
    .rrow .rmv{grid-column:1 / -1;width:auto}
    .fcard{flex-direction:column;align-items:flex-start}
    .fcard > label{width:100%}
    .fcard .acts{width:100%}
    .fcard .acts .btn{flex:1}
    .chkgrid{grid-template-columns:1fr}
  }
</style>
</head>
<body>
  <div id="app"></div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script>
/* qrcode-generator by Kazuhiko Arase — MIT license. Bundled locally so QR generation
   never depends on a third-party CDN being reachable. Exposes a global `qrcode(...)`. */
//---------------------------------------------------------------------
//
// QR Code Generator for JavaScript
//
// Copyright (c) 2009 Kazuhiko Arase
//
// URL: http://www.d-project.com/
//
// Licensed under the MIT license:
//  http://www.opensource.org/licenses/mit-license.php
//
// The word 'QR Code' is registered trademark of
// DENSO WAVE INCORPORATED
//  http://www.denso-wave.com/qrcode/faqpatent-e.html
//
//---------------------------------------------------------------------

var qrcode = function() {

  //---------------------------------------------------------------------
  // qrcode
  //---------------------------------------------------------------------

  /**
   * qrcode
   * @param typeNumber 1 to 40
   * @param errorCorrectionLevel 'L','M','Q','H'
   */
  var qrcode = function(typeNumber, errorCorrectionLevel) {

    var PAD0 = 0xEC;
    var PAD1 = 0x11;

    var _typeNumber = typeNumber;
    var _errorCorrectionLevel = QRErrorCorrectionLevel[errorCorrectionLevel];
    var _modules = null;
    var _moduleCount = 0;
    var _dataCache = null;
    var _dataList = [];

    var _this = {};

    var makeImpl = function(test, maskPattern) {

      _moduleCount = _typeNumber * 4 + 17;
      _modules = function(moduleCount) {
        var modules = new Array(moduleCount);
        for (var row = 0; row < moduleCount; row += 1) {
          modules[row] = new Array(moduleCount);
          for (var col = 0; col < moduleCount; col += 1) {
            modules[row][col] = null;
          }
        }
        return modules;
      }(_moduleCount);

      setupPositionProbePattern(0, 0);
      setupPositionProbePattern(_moduleCount - 7, 0);
      setupPositionProbePattern(0, _moduleCount - 7);
      setupPositionAdjustPattern();
      setupTimingPattern();
      setupTypeInfo(test, maskPattern);

      if (_typeNumber >= 7) {
        setupTypeNumber(test);
      }

      if (_dataCache == null) {
        _dataCache = createData(_typeNumber, _errorCorrectionLevel, _dataList);
      }

      mapData(_dataCache, maskPattern);
    };

    var setupPositionProbePattern = function(row, col) {

      for (var r = -1; r <= 7; r += 1) {

        if (row + r <= -1 || _moduleCount <= row + r) continue;

        for (var c = -1; c <= 7; c += 1) {

          if (col + c <= -1 || _moduleCount <= col + c) continue;

          if ( (0 <= r && r <= 6 && (c == 0 || c == 6) )
              || (0 <= c && c <= 6 && (r == 0 || r == 6) )
              || (2 <= r && r <= 4 && 2 <= c && c <= 4) ) {
            _modules[row + r][col + c] = true;
          } else {
            _modules[row + r][col + c] = false;
          }
        }
      }
    };

    var getBestMaskPattern = function() {

      var minLostPoint = 0;
      var pattern = 0;

      for (var i = 0; i < 8; i += 1) {

        makeImpl(true, i);

        var lostPoint = QRUtil.getLostPoint(_this);

        if (i == 0 || minLostPoint > lostPoint) {
          minLostPoint = lostPoint;
          pattern = i;
        }
      }

      return pattern;
    };

    var setupTimingPattern = function() {

      for (var r = 8; r < _moduleCount - 8; r += 1) {
        if (_modules[r][6] != null) {
          continue;
        }
        _modules[r][6] = (r % 2 == 0);
      }

      for (var c = 8; c < _moduleCount - 8; c += 1) {
        if (_modules[6][c] != null) {
          continue;
        }
        _modules[6][c] = (c % 2 == 0);
      }
    };

    var setupPositionAdjustPattern = function() {

      var pos = QRUtil.getPatternPosition(_typeNumber);

      for (var i = 0; i < pos.length; i += 1) {

        for (var j = 0; j < pos.length; j += 1) {

          var row = pos[i];
          var col = pos[j];

          if (_modules[row][col] != null) {
            continue;
          }

          for (var r = -2; r <= 2; r += 1) {

            for (var c = -2; c <= 2; c += 1) {

              if (r == -2 || r == 2 || c == -2 || c == 2
                  || (r == 0 && c == 0) ) {
                _modules[row + r][col + c] = true;
              } else {
                _modules[row + r][col + c] = false;
              }
            }
          }
        }
      }
    };

    var setupTypeNumber = function(test) {

      var bits = QRUtil.getBCHTypeNumber(_typeNumber);

      for (var i = 0; i < 18; i += 1) {
        var mod = (!test && ( (bits >> i) & 1) == 1);
        _modules[Math.floor(i / 3)][i % 3 + _moduleCount - 8 - 3] = mod;
      }

      for (var i = 0; i < 18; i += 1) {
        var mod = (!test && ( (bits >> i) & 1) == 1);
        _modules[i % 3 + _moduleCount - 8 - 3][Math.floor(i / 3)] = mod;
      }
    };

    var setupTypeInfo = function(test, maskPattern) {

      var data = (_errorCorrectionLevel << 3) | maskPattern;
      var bits = QRUtil.getBCHTypeInfo(data);

      // vertical
      for (var i = 0; i < 15; i += 1) {

        var mod = (!test && ( (bits >> i) & 1) == 1);

        if (i < 6) {
          _modules[i][8] = mod;
        } else if (i < 8) {
          _modules[i + 1][8] = mod;
        } else {
          _modules[_moduleCount - 15 + i][8] = mod;
        }
      }

      // horizontal
      for (var i = 0; i < 15; i += 1) {

        var mod = (!test && ( (bits >> i) & 1) == 1);

        if (i < 8) {
          _modules[8][_moduleCount - i - 1] = mod;
        } else if (i < 9) {
          _modules[8][15 - i - 1 + 1] = mod;
        } else {
          _modules[8][15 - i - 1] = mod;
        }
      }

      // fixed module
      _modules[_moduleCount - 8][8] = (!test);
    };

    var mapData = function(data, maskPattern) {

      var inc = -1;
      var row = _moduleCount - 1;
      var bitIndex = 7;
      var byteIndex = 0;
      var maskFunc = QRUtil.getMaskFunction(maskPattern);

      for (var col = _moduleCount - 1; col > 0; col -= 2) {

        if (col == 6) col -= 1;

        while (true) {

          for (var c = 0; c < 2; c += 1) {

            if (_modules[row][col - c] == null) {

              var dark = false;

              if (byteIndex < data.length) {
                dark = ( ( (data[byteIndex] >>> bitIndex) & 1) == 1);
              }

              var mask = maskFunc(row, col - c);

              if (mask) {
                dark = !dark;
              }

              _modules[row][col - c] = dark;
              bitIndex -= 1;

              if (bitIndex == -1) {
                byteIndex += 1;
                bitIndex = 7;
              }
            }
          }

          row += inc;

          if (row < 0 || _moduleCount <= row) {
            row -= inc;
            inc = -inc;
            break;
          }
        }
      }
    };

    var createBytes = function(buffer, rsBlocks) {

      var offset = 0;

      var maxDcCount = 0;
      var maxEcCount = 0;

      var dcdata = new Array(rsBlocks.length);
      var ecdata = new Array(rsBlocks.length);

      for (var r = 0; r < rsBlocks.length; r += 1) {

        var dcCount = rsBlocks[r].dataCount;
        var ecCount = rsBlocks[r].totalCount - dcCount;

        maxDcCount = Math.max(maxDcCount, dcCount);
        maxEcCount = Math.max(maxEcCount, ecCount);

        dcdata[r] = new Array(dcCount);

        for (var i = 0; i < dcdata[r].length; i += 1) {
          dcdata[r][i] = 0xff & buffer.getBuffer()[i + offset];
        }
        offset += dcCount;

        var rsPoly = QRUtil.getErrorCorrectPolynomial(ecCount);
        var rawPoly = qrPolynomial(dcdata[r], rsPoly.getLength() - 1);

        var modPoly = rawPoly.mod(rsPoly);
        ecdata[r] = new Array(rsPoly.getLength() - 1);
        for (var i = 0; i < ecdata[r].length; i += 1) {
          var modIndex = i + modPoly.getLength() - ecdata[r].length;
          ecdata[r][i] = (modIndex >= 0)? modPoly.getAt(modIndex) : 0;
        }
      }

      var totalCodeCount = 0;
      for (var i = 0; i < rsBlocks.length; i += 1) {
        totalCodeCount += rsBlocks[i].totalCount;
      }

      var data = new Array(totalCodeCount);
      var index = 0;

      for (var i = 0; i < maxDcCount; i += 1) {
        for (var r = 0; r < rsBlocks.length; r += 1) {
          if (i < dcdata[r].length) {
            data[index] = dcdata[r][i];
            index += 1;
          }
        }
      }

      for (var i = 0; i < maxEcCount; i += 1) {
        for (var r = 0; r < rsBlocks.length; r += 1) {
          if (i < ecdata[r].length) {
            data[index] = ecdata[r][i];
            index += 1;
          }
        }
      }

      return data;
    };

    var createData = function(typeNumber, errorCorrectionLevel, dataList) {

      var rsBlocks = QRRSBlock.getRSBlocks(typeNumber, errorCorrectionLevel);

      var buffer = qrBitBuffer();

      for (var i = 0; i < dataList.length; i += 1) {
        var data = dataList[i];
        buffer.put(data.getMode(), 4);
        buffer.put(data.getLength(), QRUtil.getLengthInBits(data.getMode(), typeNumber) );
        data.write(buffer);
      }

      // calc num max data.
      var totalDataCount = 0;
      for (var i = 0; i < rsBlocks.length; i += 1) {
        totalDataCount += rsBlocks[i].dataCount;
      }

      if (buffer.getLengthInBits() > totalDataCount * 8) {
        throw 'code length overflow. ('
          + buffer.getLengthInBits()
          + '>'
          + totalDataCount * 8
          + ')';
      }

      // end code
      if (buffer.getLengthInBits() + 4 <= totalDataCount * 8) {
        buffer.put(0, 4);
      }

      // padding
      while (buffer.getLengthInBits() % 8 != 0) {
        buffer.putBit(false);
      }

      // padding
      while (true) {

        if (buffer.getLengthInBits() >= totalDataCount * 8) {
          break;
        }
        buffer.put(PAD0, 8);

        if (buffer.getLengthInBits() >= totalDataCount * 8) {
          break;
        }
        buffer.put(PAD1, 8);
      }

      return createBytes(buffer, rsBlocks);
    };

    _this.addData = function(data, mode) {

      mode = mode || 'Byte';

      var newData = null;

      switch(mode) {
      case 'Numeric' :
        newData = qrNumber(data);
        break;
      case 'Alphanumeric' :
        newData = qrAlphaNum(data);
        break;
      case 'Byte' :
        newData = qr8BitByte(data);
        break;
      case 'Kanji' :
        newData = qrKanji(data);
        break;
      default :
        throw 'mode:' + mode;
      }

      _dataList.push(newData);
      _dataCache = null;
    };

    _this.isDark = function(row, col) {
      if (row < 0 || _moduleCount <= row || col < 0 || _moduleCount <= col) {
        throw row + ',' + col;
      }
      return _modules[row][col];
    };

    _this.getModuleCount = function() {
      return _moduleCount;
    };

    _this.make = function() {
      if (_typeNumber < 1) {
        var typeNumber = 1;

        for (; typeNumber < 40; typeNumber++) {
          var rsBlocks = QRRSBlock.getRSBlocks(typeNumber, _errorCorrectionLevel);
          var buffer = qrBitBuffer();

          for (var i = 0; i < _dataList.length; i++) {
            var data = _dataList[i];
            buffer.put(data.getMode(), 4);
            buffer.put(data.getLength(), QRUtil.getLengthInBits(data.getMode(), typeNumber) );
            data.write(buffer);
          }

          var totalDataCount = 0;
          for (var i = 0; i < rsBlocks.length; i++) {
            totalDataCount += rsBlocks[i].dataCount;
          }

          if (buffer.getLengthInBits() <= totalDataCount * 8) {
            break;
          }
        }

        _typeNumber = typeNumber;
      }

      makeImpl(false, getBestMaskPattern() );
    };

    _this.createTableTag = function(cellSize, margin) {

      cellSize = cellSize || 2;
      margin = (typeof margin == 'undefined')? cellSize * 4 : margin;

      var qrHtml = '';

      qrHtml += '<table style="';
      qrHtml += ' border-width: 0px; border-style: none;';
      qrHtml += ' border-collapse: collapse;';
      qrHtml += ' padding: 0px; margin: ' + margin + 'px;';
      qrHtml += '">';
      qrHtml += '<tbody>';

      for (var r = 0; r < _this.getModuleCount(); r += 1) {

        qrHtml += '<tr>';

        for (var c = 0; c < _this.getModuleCount(); c += 1) {
          qrHtml += '<td style="';
          qrHtml += ' border-width: 0px; border-style: none;';
          qrHtml += ' border-collapse: collapse;';
          qrHtml += ' padding: 0px; margin: 0px;';
          qrHtml += ' width: ' + cellSize + 'px;';
          qrHtml += ' height: ' + cellSize + 'px;';
          qrHtml += ' background-color: ';
          qrHtml += _this.isDark(r, c)? '#000000' : '#ffffff';
          qrHtml += ';';
          qrHtml += '"/>';
        }

        qrHtml += '</tr>';
      }

      qrHtml += '</tbody>';
      qrHtml += '</table>';

      return qrHtml;
    };

    _this.createSvgTag = function(cellSize, margin, alt, title) {

      var opts = {};
      if (typeof arguments[0] == 'object') {
        // Called by options.
        opts = arguments[0];
        // overwrite cellSize and margin.
        cellSize = opts.cellSize;
        margin = opts.margin;
        alt = opts.alt;
        title = opts.title;
      }

      cellSize = cellSize || 2;
      margin = (typeof margin == 'undefined')? cellSize * 4 : margin;

      // Compose alt property surrogate
      alt = (typeof alt === 'string') ? {text: alt} : alt || {};
      alt.text = alt.text || null;
      alt.id = (alt.text) ? alt.id || 'qrcode-description' : null;

      // Compose title property surrogate

   Reusing the same "nandwani-qr" Firebase project as Handloom, in new
   collections, so there's no second project/billing surface to manage.
   If you'd rather keep Interio fully separate, swap this config out. */
const firebaseConfig = {
  apiKey: "AIzaSyCBNt8uYNX6EUzEtNSCW37WMSdu5WMk-JM",
  authDomain: "nandwani-qr.firebaseapp.com",
  projectId: "nandwani-qr",
  storageBucket: "nandwani-qr.firebasestorage.app",
  messagingSenderId: "90601445027",
  appId: "1:90601445027:web:dbeb6f0dccbffbe8f0d116"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const ITEMS = db.collection("interio_items");
const CFG   = db.collection("interio_config").doc("main");
const LOGO = "nandwani_interio.png";
const app = document.getElementById("app");

/* Seed defaults on first run only — CFG doc is created once and never overwritten. */
const ROOM_SET_LABEL = "Room Set"; // reserved — see guards in renameProduct/removeProduct
// Room Set components are bedroom-only by definition (bed + wardrobe + bedside + dressing table, etc).
// No mattress in room sets. Hardcoded rather than tag-driven — if you rename one of these
// categories in Settings, re-add it here too.
const ROOM_SET_COMPONENT_PRODUCTS = ["Bed","Bunk Bed","2 Door Wardrobe","3 Door Wardrobe","Bedside Table","Dressing Table","Chest of Drawers"];
const DEFAULT_PRODUCTS = [
  "Sofa","Sofa Cum Bed","Recliner","Bed","Bunk Bed","2 Door Wardrobe","3 Door Wardrobe",
  "Dressing Table","Bedside Table","Chest of Drawers","Dining Table","Dining Chair","Center Table",
  "Console Table","TV Unit","Bookshelf / Wall Unit","Office Chair","Study Table",
  "Shoe Rack","Bar Cabinet","Mattress","Ottoman / Pouffe","Kids Furniture",
  "Outdoor Furniture", ROOM_SET_LABEL
];
const DEFAULT_BRANDS = [
  {name:"Damro", products:[]},
  {name:"Piyestra", products:[]},
  {name:"Kosmo by Spacewood", products:[]},
  {name:"Eezy Chair", products:[]}
];
async function ensureConfigSeeded(){
  const snap = await CFG.get();
  if(!snap.exists){
    await CFG.set({products:DEFAULT_PRODUCTS, brands:DEFAULT_BRANDS, updatedAt:firebase.firestore.FieldValue.serverTimestamp()});
  }
}

/* ============ Router ============ */
function fileIdFromHash(){
  const m = (location.hash||"").match(/f=([^&]+)/);
  return m ? decodeURIComponent(m[1]) : null;
}
function route(){
  const id = fileIdFromHash();
  if(id){ renderViewer(id); } else { renderAdmin(); }
}
window.addEventListener("hashchange", route);

/* ============ VIEWER (what a scan opens) ============ */
async function renderViewer(id){
  app.innerHTML = `<div class="viewer"><div class="notfound">Loading…</div></div>`;
  let doc;
  try{ doc = await ITEMS.doc(id).get(); }
  catch(e){ return viewerError("Couldn’t load. Check your connection and try again."); }
  if(!doc.exists) return viewerError("This code isn’t linked to an item anymore.");
  const f = doc.data();
  const subParts = [f.product, f.productName].filter(Boolean);
  const isRoomSet = f.itemType === "roomset";

  let bodyHtml;
  if(isRoomSet){
    const comps = f.components||[];
    const total = comps.reduce((s,c)=>s+(parseFloat(c.price)||0),0);
    const pct = parseFloat(f.discountPct)||0;
    const discAmt = total*pct/100;
    const net = total - discAmt;
    const rows = comps.map(c=>`
      <tr>
        <td>${esc(c.product)}${c.name?` <span style="color:var(--muted)">— ${esc(c.name)}</span>`:""}</td>
        <td class="rate">${fmtMRP(c.price)}</td>
      </tr>`).join("");
    bodyHtml = `
      <table class="rates">
        <thead><tr><th>Item</th><th>Price</th></tr></thead>
        <tbody>
          ${rows||`<tr><td colspan="2" style="text-align:center;color:var(--muted)">No items added.</td></tr>`}
          <tr><td style="font-weight:600">Total</td><td class="rate">${fmtMRP(total)}</td></tr>
          <tr><td style="font-weight:600">Discount (${esc(String(pct))}%)</td><td class="rate">− ${fmtMRP(discAmt)}</td></tr>
          <tr style="background:#fafafa"><td style="font-weight:700;color:var(--red)">Net Price</td><td class="rate" style="color:var(--red)">${fmtMRP(net)}</td></tr>
        </tbody>
      </table>`;
  } else {
    const rows = (f.variants||[]).map(r=>`
      <tr>
        <td>${esc(r.size)}</td>
        <td class="rate">${fmtMRP(r.mrp)}</td>
      </tr>`).join("");
    bodyHtml = `
      <table class="rates">
        <thead><tr><th>Size</th><th>MRP</th></tr></thead>
        <tbody>${rows||`<tr><td colspan="2" style="text-align:center;color:var(--muted)">No sizes added.</td></tr>`}</tbody>
      </table>`;
  }

  app.innerHTML = `
    <div class="viewer">
      <div class="vlogo"><img src="${LOGO}" alt="Nandwani Interio" onerror="this.style.display='none'"></div>
      <div class="vhead">
        <div class="vbrand">${esc(f.brand||"")}</div>
        <div class="vfile">${esc(f.modelNumber||"")}</div>
        <div class="vsub">${esc(subParts.join(" · "))}</div>
      </div>
      ${bodyHtml}
      <div class="vfoot">Nandwani Interio</div>
    </div>`;
  document.title = `${f.brand||""} ${f.modelNumber||""} — Nandwani Interio`.trim();
}
function viewerError(t){
  app.innerHTML = `<div class="viewer"><div class="vlogo"><img src="${LOGO}" onerror="this.style.display='none'"></div>
    <div class="notfound"><b>${esc(t)}</b>Ask staff for the current price list.</div></div>`;
}

/* ============ ADMIN ============ */
let ITEMS_CACHE = [];   // live items list
let CONFIG = {products:[], brands:[]};
let editingId = null;   // null = new

async function renderAdmin(){
  document.title = "Nandwani Interio — QR Admin";

  // Paint something before touching Firestore — a failed/slow network call
  // must never leave the page blank with no explanation.
  app.innerHTML = `<div class="wrap"><div class="empty">Connecting…</div></div>`;
  try{
    await ensureConfigSeeded();
  }catch(e){
    console.error("Config load failed:", e);
    app.innerHTML = `
      <div class="wrap">
        <div class="empty" style="text-align:left;max-width:640px;margin:60px auto">
          <b style="display:block;color:var(--charcoal);font-size:16px;margin-bottom:10px">Couldn't connect to the database.</b>
          <div style="margin-bottom:10px">${esc(e.message||String(e))}</div>
          <div style="font-size:13px">This is almost always Firestore security rules not covering the
          <code>interio_items</code> / <code>interio_config</code> collections yet. Check Firebase Console →
          Firestore Database → Rules, then reload this page.</div>
        </div>
      </div>`;
    return;
  }

  app.innerHTML = `
    <div class="wrap">
      <header class="top">
        <div class="l">
          <img src="${LOGO}" alt="logo" onerror="this.style.display='none'">
          <div class="t">QR Price Cards · Admin</div>
        </div>
        <button class="gearbtn" id="settingsBtn">⚙ Products &amp; Brands</button>
      </header>

      <div class="panel">
        <h2 id="formTitle">Add Item</h2>
        <div class="row">
          <div class="field"><label>Brand *</label>
            <select id="in-brand"><option value="">Select brand…</option></select>
          </div>
          <div class="field"><label>Product *</label>
            <select id="in-product"><option value="">Select brand first…</option></select>
          </div>
          <div class="field"><label>Model Number *</label>
            <input id="in-model" placeholder="e.g. DM-2201" autocomplete="off">
          </div>
        </div>
        <div class="row">
          <div class="field" style="flex:2"><label>Product Name (optional)</label>
            <input id="in-productname" list="productNames" placeholder="e.g. Sovana — helps tell similar models apart" autocomplete="off">
            <datalist id="productNames"></datalist>
          </div>
        </div>
        <div class="hintline" id="brandHint"></div>

        <div class="ranges" id="standardBlock">
          <div class="rangehdr"><span>Sizes &amp; MRP (at least one required)</span></div>
          <div id="rangeList"></div>
          <button class="addrange" id="addRange">+ Add size</button>
        </div>

        <div class="ranges" id="roomSetBlock" style="display:none">
          <div class="rangehdr"><span>Room Set Components (at least one required)</span></div>
          <div id="componentList"></div>
          <button class="addrange" id="addComponent">+ Add component</button>
          <div class="row" style="margin-top:14px">
            <div class="field"><label>Discount %</label>
              <input id="in-discpct" placeholder="e.g. 10" inputmode="decimal">
            </div>
            <div class="field"><label>Total / Discount / Net</label>
              <div id="roomSetPreview" style="padding:11px 0;font-size:14px;color:var(--charcoal);font-weight:600">—</div>
            </div>
          </div>
        </div>

        <div class="formfoot" style="margin-top:14px">
          <button class="btn primary" id="saveBtn">Save Item</button>
          <button class="btn ghost" id="cancelBtn" style="display:none">Cancel</button>
          <span class="msg" id="formMsg"></span>
        </div>
      </div>

      <div id="list"></div>
    </div>

    <div id="selectBar"></div>

    <div class="overlay" id="overlay">
      <div class="modal">
        <button class="close" id="mClose">&times;</button>
        <h3 id="mTitle"></h3>
        <div class="sub" id="mSub"></div>
        <div id="mErr" style="display:none;background:#fdecec;color:#b02;border-radius:8px;padding:10px 12px;font-size:13px;margin-bottom:12px;text-align:left"></div>
        <div class="cardprev"><img id="mImg" alt="card"></div>
        <div class="mfoot">
          <button class="btn primary" id="mDownload">Download A6 PNG</button>
          <button class="btn ghost" id="mPrint">Print</button>
          <button class="btn ghost" id="mCopy">Copy link</button>
        </div>
        <div class="hint">This QR is permanent. Edit the price anytime, hit Save, and the scanned page updates automatically — no reprinting.</div>
      </div>
    </div>

    <div class="overlay" id="cfgOverlay">
      <div class="modal wide">
        <button class="close" id="cfgClose">&times;</button>
        <h3>Products &amp; Brands</h3>
        <div class="sub">Manage the dropdown lists. Renaming here doesn't change items you've already saved.</div>
        <div class="tabbar">
          <button class="tabbtn on" id="tabProducts">Products</button>
          <button class="tabbtn" id="tabBrands">Brands</button>
        </div>
        <div id="cfgBody"></div>
      </div>
    </div>`;

  wireForm();
  addRangeRow();
  subscribeConfig();
  subscribeItems();
  wireModal();
  wireSettings();
  renderSelectBar();
}

/* ---- config (products/brands) live sync ---- */
function subscribeConfig(){
  CFG.onSnapshot(snap=>{
    if(!snap.exists) return;
    CONFIG = snap.data();
    CONFIG.products = CONFIG.products || [];
    CONFIG.brands = CONFIG.brands || [];
    populateBrandSelect();
    populateProductSelect();
    if(document.getElementById("cfgBody")) renderCfgTab(currentCfgTab);
  }, err=>{
    console.error("Config sync failed:", err);
    flash("Lost connection to product/brand settings: "+err.message);
  });
}
function populateBrandSelect(){
  const sel = document.getElementById("in-brand"); if(!sel) return;
  const cur = sel.value;
  sel.innerHTML = `<option value="">Select brand…</option>` +
    CONFIG.brands.map(b=>`<option value="${esc(b.name)}">${esc(b.name)}</option>`).join("");
  if(cur) sel.value = cur;
}
function populateProductSelect(){
  const sel = document.getElementById("in-product"); if(!sel) return;
  const brandName = document.getElementById("in-brand").value;
  const brand = CONFIG.brands.find(b=>b.name===brandName);
  const hint = document.getElementById("brandHint");
  let options;
  if(!brandName){
    options = [];
  } else if(brand && brand.products && brand.products.length){
    options = brand.products;
  } else {
    options = CONFIG.products; // brand has no configured product list yet — show everything
  }
  const cur = sel.value;
  sel.disabled = !brandName;
  sel.innerHTML = (brandName ? `<option value="">Select product…</option>` : `<option value="">Select brand first…</option>`) +
    options.map(p=>`<option value="${esc(p)}">${esc(p)}</option>`).join("");
  if(options.includes(cur)) sel.value = cur;
  hint.textContent = brandName && (!brand || !brand.products || !brand.products.length)
    ? "This brand's product list isn't configured yet — showing all products. Set it up in ⚙ Products & Brands."
    : "";
  toggleItemModeBlocks();
  renderProductNameDatalist();
}
function toggleItemModeBlocks(){
  const isRoomSet = document.getElementById("in-product").value === ROOM_SET_LABEL;
  document.getElementById("standardBlock").style.display = isRoomSet ? "none" : "";
  document.getElementById("roomSetBlock").style.display = isRoomSet ? "" : "none";
  if(isRoomSet && document.getElementById("componentList").children.length===0) addComponentRow();
}
function renderProductNameDatalist(){
  const brand = document.getElementById("in-brand").value;
  const product = document.getElementById("in-product").value;
  const names = [...new Set(
    ITEMS_CACHE.filter(f=>f.productName && (!brand||f.brand===brand) && (!product||f.product===product)).map(f=>f.productName)
  )].sort();
  const dl = document.getElementById("productNames");
  if(dl) dl.innerHTML = names.map(n=>`<option value="${esc(n)}">`).join("");
}

/* ---- form wiring ---- */
function wireForm(){
  document.getElementById("addRange").onclick = ()=>addRangeRow();
  document.getElementById("addComponent").onclick = ()=>addComponentRow();
  document.getElementById("saveBtn").onclick = saveItem;
  document.getElementById("cancelBtn").onclick = resetForm;
  document.getElementById("in-discpct").addEventListener("input", updateRoomSetPreview);
  document.getElementById("in-brand").addEventListener("change", ()=>{
    document.getElementById("in-product").value = "";
    populateProductSelect();
  });
  document.getElementById("in-product").addEventListener("change", ()=>{
    toggleItemModeBlocks();
    renderProductNameDatalist();
  });
}
function addRangeRow(data){
  const list = document.getElementById("rangeList");
  const div = document.createElement("div");
  div.className = "rrow";
  div.innerHTML = `
    <input placeholder="Size *"      class="r-size" value="${data?esc(data.size):""}">
    <input placeholder="MRP ₹ *"     class="r-mrp"  value="${data?esc(data.mrp):""}" inputmode="decimal">
    <button class="rmv" title="Remove">×</button>`;
  div.querySelector(".rmv").onclick = ()=>{
    const rows = list.querySelectorAll(".rrow");
    if(rows.length>1) div.remove();
    else flash("Keep at least one size.");
  };
  list.appendChild(div);
}
function componentProductOptions(){
  // Bedroom items only — a Room Set doesn't get a sofa or a dining table.
  return CONFIG.products.filter(p=>ROOM_SET_COMPONENT_PRODUCTS.includes(p));
}
function addComponentRow(data){
  const list = document.getElementById("componentList");
  const div = document.createElement("div");
  div.className = "crow";
  const opts = componentProductOptions();
  div.innerHTML = `
    <select class="c-product">
      <option value="">Select…</option>
      ${opts.map(p=>`<option value="${esc(p)}" ${data&&data.product===p?"selected":""}>${esc(p)}</option>`).join("")}
    </select>
    <input placeholder="Name (optional)" class="c-name"  value="${data?esc(data.name):""}">
    <input placeholder="Price ₹ *"       class="c-price" value="${data?esc(data.price):""}" inputmode="decimal">
    <button class="rmv" title="Remove">×</button>`;
  div.querySelector(".rmv").onclick = ()=>{
    const rows = list.querySelectorAll(".crow");
    if(rows.length>1){ div.remove(); updateRoomSetPreview(); }
    else flash("Keep at least one component.");
  };
  div.querySelector(".c-price").addEventListener("input", updateRoomSetPreview);
  list.appendChild(div);
  updateRoomSetPreview();
}
function updateRoomSetPreview(){
  const el = document.getElementById("roomSetPreview"); if(!el) return;
  const prices = [...document.querySelectorAll("#componentList .crow")].map(r=>parseFloat(r.querySelector(".c-price").value)||0);
  const total = prices.reduce((a,b)=>a+b,0);
  const pct = parseFloat(document.getElementById("in-discpct").value)||0;
  const disc = total*pct/100;
  const net = total-disc;
  el.textContent = `${fmtMRP(total)}  −  ${fmtMRP(disc)}  =  ${fmtMRP(net)} net`;
}
function readForm(){
  const brand = document.getElementById("in-brand").value.trim();
  const product = document.getElementById("in-product").value.trim();
  const modelNumber = document.getElementById("in-model").value.trim();
  const productName = document.getElementById("in-productname").value.trim();
  const isRoomSet = product === ROOM_SET_LABEL;
  if(isRoomSet){
    const components = [...document.querySelectorAll("#componentList .crow")].map(r=>({
      product: r.querySelector(".c-product").value.trim(),
      name:    r.querySelector(".c-name").value.trim(),
      price:   r.querySelector(".c-price").value.trim()
    })).filter(c=>c.product||c.name||c.price);
    const discountPct = document.getElementById("in-discpct").value.trim();
    return {brand,product,modelNumber,productName,isRoomSet,components,discountPct};
  }
  const variants = [...document.querySelectorAll("#rangeList .rrow")].map(r=>({
    size: r.querySelector(".r-size").value.trim(),
    mrp:  r.querySelector(".r-mrp").value.trim()
  })).filter(r=>r.size||r.mrp);
  return {brand,product,modelNumber,productName,isRoomSet,variants};
}
async function saveItem(){
  const f = readForm();
  if(!f.brand)       return flash("Brand is required.");
  if(!f.product)     return flash("Product is required.");
  if(!f.modelNumber) return flash("Model number is required.");

  let payload;
  if(f.isRoomSet){
    if(f.components.length===0) return flash("Add at least one component.");
    const bad = f.components.find(c=>!c.product || !c.price);
    if(bad) return flash("Each component needs a product and a price.");
    payload = {
      brand:f.brand, product:f.product, modelNumber:f.modelNumber, productName:f.productName,
      itemType:"roomset", components:f.components, discountPct:f.discountPct||"0",
      variants: firebase.firestore.FieldValue.delete(),
      updatedAt:firebase.firestore.FieldValue.serverTimestamp()
    };
  } else {
    if(f.variants.length===0) return flash("Add at least one size.");
    const bad = f.variants.find(r=>!r.size || !r.mrp);
    if(bad) return flash("Each row needs both a size and an MRP.");
    payload = {
      brand:f.brand, product:f.product, modelNumber:f.modelNumber, productName:f.productName,
      itemType:"standard", variants:f.variants,
      components: firebase.firestore.FieldValue.delete(),
      discountPct: firebase.firestore.FieldValue.delete(),
      updatedAt:firebase.firestore.FieldValue.serverTimestamp()
    };
  }

  try{
    if(editingId){
      await ITEMS.doc(editingId).update(payload);
      flash("Saved. Scanned page is now updated.",true);
    }else{
      payload.createdAt = firebase.firestore.FieldValue.serverTimestamp();
      await ITEMS.add(payload);
      flash("Item added.",true);
    }
    resetForm();
  }catch(e){ flash("Save failed: "+e.message); }
}
function editItem(id){
  const f = ITEMS_CACHE.find(x=>x.id===id); if(!f) return;
  editingId = id;
  document.getElementById("formTitle").textContent = "Edit Item";
  document.getElementById("in-brand").value = f.brand||"";
  populateProductSelect();
  document.getElementById("in-product").value = f.product||"";
  document.getElementById("in-productname").value = f.productName||"";
  document.getElementById("in-model").value = f.modelNumber||"";
  toggleItemModeBlocks();
  renderProductNameDatalist();

  document.getElementById("rangeList").innerHTML = "";
  (f.variants&&f.variants.length?f.variants:[{}]).forEach(r=>addRangeRow(r));

  document.getElementById("componentList").innerHTML = "";
  if(f.itemType==="roomset"){
    (f.components&&f.components.length?f.components:[{}]).forEach(c=>addComponentRow(c));
    document.getElementById("in-discpct").value = f.discountPct||"";
    updateRoomSetPreview();
  } else {
    document.getElementById("in-discpct").value = "";
  }

  document.getElementById("cancelBtn").style.display = "inline-block";
  document.getElementById("saveBtn").textContent = "Update Item";
  window.scrollTo({top:0,behavior:"smooth"});
}
function resetForm(){
  editingId = null;
  document.getElementById("formTitle").textContent = "Add Item";
  document.getElementById("in-brand").value = "";
  populateProductSelect();
  document.getElementById("in-productname").value = "";
  document.getElementById("in-model").value = "";
  document.getElementById("rangeList").innerHTML = "";
  addRangeRow();
  document.getElementById("componentList").innerHTML = "";
  document.getElementById("in-discpct").value = "";
  toggleItemModeBlocks();
  document.getElementById("cancelBtn").style.display = "none";
  document.getElementById("saveBtn").textContent = "Save Item";
}
async function deleteItem(id){
  const f = ITEMS_CACHE.find(x=>x.id===id);
  if(!confirm(`Delete "${f?.brand||""} ${f?.modelNumber||""}"?\nAny printed QR for it will stop working.`)) return;
  try{ await ITEMS.doc(id).delete(); }catch(e){ alert("Delete failed: "+e.message); }
}
function flash(t,ok){
  const m=document.getElementById("formMsg");
  m.textContent=t; m.className="msg"+(ok?" ok":"");
  if(ok) setTimeout(()=>{if(m.textContent===t)m.textContent="";},2500);
}

/* ---- live list ---- */
function subscribeItems(){
  ITEMS.orderBy("brand").onSnapshot(snap=>{
    ITEMS_CACHE = snap.docs.map(d=>({id:d.id,...d.data()}));
    SELECTED = new Set([...SELECTED].filter(id=>ITEMS_CACHE.some(f=>f.id===id)));
    renderList();
    renderSelectBar();
  }, err=>{
    document.getElementById("list").innerHTML =
      `<div class="empty">Couldn’t load items: ${esc(err.message)}</div>`;
  });
}
function renderList(){
  const el=document.getElementById("list");
  if(ITEMS_CACHE.length===0){ el.innerHTML=`<div class="empty">No items yet. Add your first above.</div>`; return; }
  const byBrand={};
  ITEMS_CACHE.forEach(f=>{ (byBrand[f.brand||"—"] ||= []).push(f); });
  el.innerHTML = Object.keys(byBrand).sort().map(brand=>{
    const items = byBrand[brand]
      .sort((a,b)=>(a.modelNumber||"").localeCompare(b.modelNumber||""))
      .map(f=>{
        let meta;
        if(f.itemType==="roomset"){
          const comps = f.components||[];
          const total = comps.reduce((s,c)=>s+(parseFloat(c.price)||0),0);
          const net = total - total*(parseFloat(f.discountPct)||0)/100;
          meta = `Room Set · ${comps.length} item${comps.length===1?"":"s"} · net ${fmtMRP(net)}`;
        } else {
          meta = `${esc(f.product||"")} · ${(f.variants||[]).length} size${(f.variants||[]).length===1?"":"s"}`;
        }
        return `
        <div class="fcard">
          <label style="display:flex;align-items:center;gap:12px;cursor:pointer;flex:1;min-width:0">
            <input type="checkbox" style="width:18px;height:18px;flex-shrink:0" ${SELECTED.has(f.id)?"checked":""} onchange="toggleSelect('${f.id}', this.checked)">
            <div style="min-width:0">
              <div class="fn">${esc(f.modelNumber)}${f.productName?` <span style="color:var(--muted);font-weight:400">— ${esc(f.productName)}</span>`:""}</div>
              <div class="fmeta">${meta}</div>
            </div>
          </label>
          <div class="acts">
            <button class="btn primary tiny" onclick="openQR('${f.id}')">QR / Print</button>
            <button class="btn ghost tiny" onclick="editItem('${f.id}')">Edit</button>
            <button class="btn ghost tiny" onclick="deleteItem('${f.id}')">Delete</button>
          </div>
        </div>`;}).join("");
    return `<div class="brandgroup"><div class="brandname">${esc(brand)}</div>${items}</div>`;
  }).join("");
}

/* ============ SETTINGS: Products & Brands ============ */
let currentCfgTab = "products";
let editingBrandName = null;

function wireSettings(){
  document.getElementById("settingsBtn").onclick = ()=>{
    document.getElementById("cfgOverlay").classList.add("on");
    renderCfgTab("products");
  };
  document.getElementById("cfgClose").onclick = ()=> document.getElementById("cfgOverlay").classList.remove("on");
  document.getElementById("cfgOverlay").onclick = e=>{ if(e.target.id==="cfgOverlay") document.getElementById("cfgOverlay").classList.remove("on"); };
  document.getElementById("tabProducts").onclick = ()=>renderCfgTab("products");
  document.getElementById("tabBrands").onclick = ()=>renderCfgTab("brands");
}
function renderCfgTab(tab){
  currentCfgTab = tab;
  document.getElementById("tabProducts").classList.toggle("on", tab==="products");
  document.getElementById("tabBrands").classList.toggle("on", tab==="brands");
  const body = document.getElementById("cfgBody");
  if(tab==="products"){
    body.innerHTML = `
      <div class="addnew">
        <input id="newProduct" placeholder="New product category…">
        <button class="btn primary tiny" id="addProductBtn">Add</button>
      </div>
      <div class="cfglist" id="productList"></div>`;
    document.getElementById("addProductBtn").onclick = addProduct;
    document.getElementById("newProduct").addEventListener("keydown", e=>{ if(e.key==="Enter") addProduct(); });
    renderProductList();
  } else {
    body.innerHTML = `
      <div class="addnew">
        <input id="newBrand" placeholder="New brand name…">
        <button class="btn primary tiny" id="addBrandBtn">Add</button>
      </div>
      <div class="cfglist" id="brandList"></div>
      <div id="brandProdsBox"></div>`;
    document.getElementById("addBrandBtn").onclick = addBrand;
    document.getElementById("newBrand").addEventListener("keydown", e=>{ if(e.key==="Enter") addBrand(); });
    renderBrandList();
  }
}
function renderProductList(){
  const el = document.getElementById("productList"); if(!el) return;
  el.innerHTML = CONFIG.products.map(p=>{
    const reserved = p===ROOM_SET_LABEL;
    return `
    <div class="cfgitem">
      <span class="nm">${esc(p)}${reserved?` <span style="color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.03em">reserved</span>`:""}</span>
      <span class="acts">
        ${reserved ? "" : `
          <button class="btn ghost tiny" onclick="renameProduct('${escJs(p)}')">Rename</button>
          <button class="btn ghost tiny" onclick="removeProduct('${escJs(p)}')">Remove</button>`}
      </span>
    </div>`;}).join("") || `<div class="empty">No products yet.</div>`;
}
async function addProduct(){
  const inp = document.getElementById("newProduct");
  const val = inp.value.trim();
  if(!val) return;
  if(CONFIG.products.includes(val)) return flashCfg("Already in the list.");
  await CFG.update({products: firebase.firestore.FieldValue.arrayUnion(val)});
  inp.value = "";
}
async function renameProduct(oldName){
  if(oldName===ROOM_SET_LABEL) return flashCfg(`"${ROOM_SET_LABEL}" is a reserved category the app keys off of — it can't be renamed. Add a new category if you want a different label alongside it.`);
  const next = prompt("Rename product:", oldName);
  if(!next || !next.trim() || next.trim()===oldName) return;
  const list = CONFIG.products.map(p=>p===oldName?next.trim():p);
  await CFG.update({products:list});
}
async function removeProduct(name){
  if(name===ROOM_SET_LABEL) return flashCfg(`"${ROOM_SET_LABEL}" is reserved and can't be removed while the app supports room sets.`);
  if(!confirm(`Remove "${name}" from the product list?\nItems already saved with this product are unaffected.`)) return;
  await CFG.update({products: firebase.firestore.FieldValue.arrayRemove(name)});
  // also strip it from any brand's product list
  const brands = CONFIG.brands.map(b=>({...b, products:(b.products||[]).filter(p=>p!==name)}));
  await CFG.update({brands});
}

function renderBrandList(){
  const el = document.getElementById("brandList"); if(!el) return;
  el.innerHTML = CONFIG.brands.map(b=>`
    <div class="cfgitem">
      <span class="nm">${esc(b.name)}</span>
      <span class="acts">
        <button class="btn ghost tiny" onclick="selectBrandForProducts('${escJs(b.name)}')">Products it sells</button>
        <button class="btn ghost tiny" onclick="renameBrand('${escJs(b.name)}')">Rename</button>
        <button class="btn ghost tiny" onclick="removeBrand('${escJs(b.name)}')">Remove</button>
      </span>
    </div>`).join("") || `<div class="empty">No brands yet.</div>`;
  if(editingBrandName && CONFIG.brands.some(b=>b.name===editingBrandName)){
    renderBrandProductsBox(editingBrandName);
  } else {
    document.getElementById("brandProdsBox").innerHTML = "";
  }
}
async function addBrand(){
  const inp = document.getElementById("newBrand");
  const val = inp.value.trim();
  if(!val) return;
  if(CONFIG.brands.some(b=>b.name===val)) return flashCfg("Already in the list.");
  await CFG.update({brands: firebase.firestore.FieldValue.arrayUnion({name:val, products:[]})});
  inp.value = "";
}
async function renameBrand(oldName){
  const next = prompt("Rename brand:", oldName);
  if(!next || !next.trim() || next.trim()===oldName) return;
  const brands = CONFIG.brands.map(b=> b.name===oldName ? {...b, name:next.trim()} : b);
  await CFG.update({brands});
  if(editingBrandName===oldName) editingBrandName = next.trim();
}
async function removeBrand(name){
  if(!confirm(`Remove brand "${name}"?\nItems already saved under this brand are unaffected.`)) return;
  const brands = CONFIG.brands.filter(b=>b.name!==name);
  await CFG.update({brands});
  if(editingBrandName===name) editingBrandName = null;
}
function selectBrandForProducts(name){
  editingBrandName = name;
  renderBrandProductsBox(name);
}
function renderBrandProductsBox(brandName){
  const brand = CONFIG.brands.find(b=>b.name===brandName);
  const box = document.getElementById("brandProdsBox"); if(!box || !brand) return;
  const selected = new Set(brand.products||[]);
  box.innerHTML = `
    <div class="brandprods">
      <div class="lbl">What does ${esc(brandName)} sell?</div>
      <div class="chkgrid">
        ${CONFIG.products.map(p=>`
          <label>
            <input type="checkbox" ${selected.has(p)?"checked":""} onchange="toggleBrandProduct('${escJs(brandName)}','${escJs(p)}', this.checked)">
            ${esc(p)}
          </label>`).join("")}
      </div>
      <div class="hint">Leave everything unchecked and the item form will show all products for this brand as a fallback.</div>
    </div>`;
}
async function toggleBrandProduct(brandName, product, on){
  const brands = CONFIG.brands.map(b=>{
    if(b.name!==brandName) return b;
    const set = new Set(b.products||[]);
    if(on) set.add(product); else set.delete(product);
    return {...b, products:[...set]};
  });
  await CFG.update({brands});
}
function flashCfg(t){ alert(t); }

/* ---- batch select + A4 print ---- */
let SELECTED = new Set();
function toggleSelect(id, on){
  if(on) SELECTED.add(id); else SELECTED.delete(id);
  renderSelectBar();
}
function clearSelection(){ SELECTED.clear(); renderList(); renderSelectBar(); }
function renderSelectBar(){
  const bar = document.getElementById("selectBar");
  if(!bar) return;
  if(SELECTED.size===0){ bar.innerHTML = ""; return; }
  bar.innerHTML = `
    <div class="selbar">
      <span class="cnt">${SELECTED.size} item${SELECTED.size===1?"":"s"} selected</span>
      <button class="btn primary" id="printSelBtn">Print Selected (A4)</button>
      <button class="btn ghost" id="clearSelBtn">Clear</button>
    </div>`;
  document.getElementById("printSelBtn").onclick = printSelected;
  document.getElementById("clearSelBtn").onclick = clearSelection;
}
async function printSelected(){
  const ids = [...SELECTED];
  if(ids.length===0) return;
  const btn = document.getElementById("printSelBtn");
  const orig = btn.textContent;
  btn.textContent = "Preparing…"; btn.disabled = true;

  const win = window.open("", "_blank");
  if(!win){
    alert("Your browser blocked the print pop-up. Allow pop-ups for this site and try again.");
    btn.textContent = orig; btn.disabled = false;
    return;
  }

  const PAGE_MARGIN_MM = 10, GUTTER_MM = 6;
  const usableW = 297 - PAGE_MARGIN_MM*2, usableH = 210 - PAGE_MARGIN_MM*2;
  const cellW = (usableW - GUTTER_MM) / 2, cellH = (usableH - GUTTER_MM) / 2;
  const ratio = 148/105;
  let cardW = cellH * ratio, cardH = cellH;
  if(cardW > cellW){ cardW = cellW; cardH = cellW / ratio; }

  win.document.write(`<!DOCTYPE html><html><head><title>Print — Nandwani Interio QR Cards</title><style>
    @page{size:A4 landscape;margin:${PAGE_MARGIN_MM}mm}
    html,body{margin:0;padding:0;background:#fff}
    .page{
      display:grid;grid-template-columns:${cellW}mm ${cellW}mm;grid-template-rows:${cellH}mm ${cellH}mm;
      gap:${GUTTER_MM}mm;page-break-after:always
    }
    .page:last-child{page-break-after:auto}
    .cell{width:${cellW}mm;height:${cellH}mm;display:flex;align-items:center;justify-content:center}
    .cardbox{position:relative;width:${cardW}mm;height:${cardH}mm}
    .cardbox img{width:100%;height:100%;display:block}
    .tick{position:absolute;background:#aaa}
    .note{font-family:sans-serif;text-align:center;padding:40px;color:#666}
  </style></head><body><div class="note">Rendering ${ids.length} card${ids.length===1?"":"s"}…</div></body></html>`);
  win.document.close();

  const failed = [];
  const urls = [];
  for(const id of ids){
    const f = ITEMS_CACHE.find(x=>x.id===id);
    if(!f){ continue; }
    try{ const cv = await buildCardCanvas(f); urls.push(cv.toDataURL("image/png")); }
    catch(e){ console.error("Card failed:", f.modelNumber, e); failed.push(f.modelNumber||id); }
  }

  win.document.body.innerHTML = "";
  for(let i=0;i<urls.length;i+=4){
    const page = win.document.createElement("div");
    page.className = "page";
    urls.slice(i,i+4).forEach(u=>{
      const cell = win.document.createElement("div");
      cell.className = "cell";
      const box = win.document.createElement("div");
      box.className = "cardbox";
      const img = win.document.createElement("img");
      img.src = u;
      box.appendChild(img);
      [["top:-2mm;left:-2mm;width:2mm;height:0.3mm","top:-2mm;left:-2mm;width:0.3mm;height:2mm"],
       ["top:-2mm;right:-2mm;width:2mm;height:0.3mm","top:-2mm;right:-2mm;width:0.3mm;height:2mm"],
       ["bottom:-2mm;left:-2mm;width:2mm;height:0.3mm","bottom:-2mm;left:-2mm;width:0.3mm;height:2mm"],
       ["bottom:-2mm;right:-2mm;width:2mm;height:0.3mm","bottom:-2mm;right:-2mm;width:0.3mm;height:2mm"]]
      .flat().forEach(css=>{
        const t = win.document.createElement("div");
        t.className = "tick"; t.style.cssText = css;
        box.appendChild(t);
      });
      cell.appendChild(box);
      page.appendChild(cell);
    });
    win.document.body.appendChild(page);
  }

  btn.textContent = orig; btn.disabled = false;

  if(urls.length===0){
    win.document.body.innerHTML = `<div class="note">Nothing rendered — check the console in this tab for errors.</div>`;
    return;
  }
  if(failed.length){
    alert(`${failed.length} card(s) failed to render and were skipped: ${failed.join(", ")}`);
  }
  setTimeout(()=>win.print(), 400);
}

/* ============ QR CARD (A6 landscape) ============ */
function viewerURL(id){ return location.origin + location.pathname + "#f=" + encodeURIComponent(id); }

function fitBoxSize(natW, natH, maxW, maxH){
  const scale = Math.min(maxW/natW, maxH/natH);
  return {w: natW*scale, h: natH*scale};
}
function fitFontSize(ctx, text, maxWidth, startSize, minSize, weight, family){
  let size = startSize;
  const mk = s => `${weight} ${s}px ${family}`;
  ctx.font = mk(size);
  while(size > minSize && ctx.measureText(text).width > maxWidth){
    size -= 2;
    ctx.font = mk(size);
  }
  let out = text;
  if(ctx.measureText(out).width > maxWidth){
    while(out.length > 1 && ctx.measureText(out+"…").width > maxWidth) out = out.slice(0,-1);
    out += "…";
  }
  return {text: out, size, font: mk(size)};
}
function drawTracked(ctx, text, cx, cy, trackPx){
  const chars = text.split("");
  const widths = chars.map(ch=>ctx.measureText(ch).width);
  const total = widths.reduce((a,b)=>a+b,0) + trackPx*Math.max(0,chars.length-1);
  let x = cx - total/2;
  const prevAlign = ctx.textAlign;
  ctx.textAlign = "left";
  chars.forEach((ch,i)=>{ ctx.fillText(ch, x, cy); x += widths[i] + trackPx; });
  ctx.textAlign = prevAlign;
}
function roundRectPath(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}
function drawCornerTicks(ctx,x,y,w,h,leg,thick,color){
  ctx.fillStyle = color;
  [{cx:x,cy:y,hx:1,vy:1},{cx:x+w,cy:y,hx:-1,vy:1},{cx:x,cy:y+h,hx:1,vy:-1},{cx:x+w,cy:y+h,hx:-1,vy:-1}]
  .forEach(({cx,cy,hx,vy})=>{
    ctx.fillRect(hx>0?cx:cx-leg, vy>0?cy:cy-thick, leg, thick);
    ctx.fillRect(hx>0?cx:cx-thick, vy>0?cy:cy-leg, thick, leg);
  });
}

async function buildCardCanvas(item){
  const W=1748, H=1240;
  const cv=document.createElement("canvas"); cv.width=W; cv.height=H;
  const c=cv.getContext("2d");
  c.fillStyle="#ffffff"; c.fillRect(0,0,W,H);

  const BAR=14;
  c.fillStyle="#e11d2a";
  c.fillRect(0,0,W,BAR);
  c.fillRect(0,H-BAR,W,BAR);

  const qc = renderQRCanvas(viewerURL(item.id), 560, 2);
  const logo = await loadImg(LOGO).catch(()=>null);

  let y = BAR + 56;
  if(logo){
    const {w:lw,h:lh} = fitBoxSize(logo.naturalWidth, logo.naturalHeight, 828, 150);
    c.drawImage(logo, (W-lw)/2, y, lw, lh);
    y += lh + 44;
  } else {
    y += 44;
  }

  c.textAlign="center"; c.fillStyle="#e11d2a";
  c.font="700 32px Arial";
  y += 32;
  drawTracked(c, (item.brand||"").toUpperCase(), W/2, y, 5);
  y += 34;

  c.fillStyle="#8a8a90"; c.font="600 26px Arial";
  const prodFit = fitFontSize(c, item.product||"", W-280, 26, 20, 600, "Arial");
  c.font = prodFit.font;
  y += 30;
  c.fillText(prodFit.text, W/2, y);
  y += 42;

  c.fillStyle="#1c1c1e";
  const fit = fitFontSize(c, item.modelNumber||"", W-280, 78, 42, 700, "Arial");
  c.font = fit.font;
  y += fit.size*0.78;
  c.fillText(fit.text, W/2, y);
  y += fit.size*0.30 + 24;

  const lineW=110, lineThick=4, gap=40;
  c.fillStyle="#e11d2a";
  c.fillRect(W/2 - gap/2 - lineW, y, lineW, lineThick);
  c.fillRect(W/2 + gap/2, y, lineW, lineThick);
  y += lineThick + 44;

  const QR=560, PAD=24, FRAME=QR+PAD*2, captionH=64, bottomReserve=BAR+40;
  let qy = Math.max(y, H - FRAME - captionH - bottomReserve);
  const fx=(W-FRAME)/2, fy=qy;
  c.fillStyle="#ffffff"; c.strokeStyle="#e5e5e8"; c.lineWidth=2;
  roundRectPath(c,fx,fy,FRAME,FRAME,20); c.fill(); c.stroke();
  drawCornerTicks(c, fx, fy, FRAME, FRAME, 32, 5, "#e11d2a");
  c.drawImage(qc, fx+PAD, fy+PAD, QR, QR);

  c.fillStyle="#8a8a90"; c.font="600 24px Arial";
  drawTracked(c, "SCAN FOR CURRENT PRICE", W/2, fy+FRAME+42, 3);

  return cv;
}
function loadImg(src){
  return new Promise((res,rej)=>{ const i=new Image(); i.onload=()=>res(i); i.onerror=rej; i.src=src; });
}
function renderQRCanvas(text, sizePx, marginModules){
  if(typeof qrcode !== "function"){
    throw new Error("QR encoder missing — make sure qrcode.min.js is deployed alongside this page.");
  }
  const qr = qrcode(0, "M");
  qr.addData(text);
  qr.make();
  const count = qr.getModuleCount();
  const totalModules = count + marginModules*2;
  const scale = sizePx / totalModules;
  const cv = document.createElement("canvas");
  cv.width = sizePx; cv.height = sizePx;
  const ctx = cv.getContext("2d");
  ctx.fillStyle = "#ffffff"; ctx.fillRect(0,0,sizePx,sizePx);
  ctx.fillStyle = "#1c1c1e";
  for(let r=0;r<count;r++){
    for(let col=0;col<count;col++){
      if(qr.isDark(r,col)){
        const x = Math.round((col+marginModules)*scale);
        const y = Math.round((r+marginModules)*scale);
        ctx.fillRect(x, y, Math.ceil(scale), Math.ceil(scale));
      }
    }
  }
  return cv;
}

/* ---- QR modal ---- */
let modalItem=null, modalDataURL=null;
function wireModal(){
  document.getElementById("mClose").onclick = closeQR;
  document.getElementById("overlay").onclick = e=>{ if(e.target.id==="overlay") closeQR(); };
  document.getElementById("mDownload").onclick = ()=>{
    if(!modalDataURL) return;
    const clean = s => (s||"").trim().replace(/[^A-Za-z0-9]+/g,"_").replace(/^_+|_+$/g,"");
    const a=document.createElement("a");
    a.href=modalDataURL;
    a.download=`${clean(modalItem.brand)}_${clean(modalItem.modelNumber)}_A6.png`;
    a.click();
  };
  document.getElementById("mPrint").onclick = printCard;
  document.getElementById("mCopy").onclick = async ()=>{
    try{ await navigator.clipboard.writeText(viewerURL(modalItem.id)); flashModal("Link copied"); }
    catch{ prompt("Copy link:", viewerURL(modalItem.id)); }
  };
}
async function openQR(id){
  modalItem = ITEMS_CACHE.find(f=>f.id===id); if(!modalItem) return;
  document.getElementById("mTitle").textContent = modalItem.modelNumber||"";
  document.getElementById("mSub").textContent = `${modalItem.brand||""} · ${modalItem.product||""}`;
  document.getElementById("mImg").src = "";
  document.getElementById("mErr").style.display = "none";
  modalDataURL = null;
  setModalButtonsEnabled(false);
  document.getElementById("overlay").classList.add("on");
  try{
    const cv = await buildCardCanvas(modalItem);
    modalDataURL = cv.toDataURL("image/png");
    document.getElementById("mImg").src = modalDataURL;
    setModalButtonsEnabled(true);
  }catch(e){
    console.error("QR card render failed:", e);
    const errEl = document.getElementById("mErr");
    errEl.textContent = "Couldn't generate the card — " + e.message;
    errEl.style.display = "block";
  }
}
function setModalButtonsEnabled(on){
  ["mDownload","mPrint","mCopy"].forEach(id=>{
    const el = document.getElementById(id);
    el.disabled = !on;
    el.style.opacity = on ? "1" : ".5";
    el.style.cursor = on ? "pointer" : "default";
  });
}
function closeQR(){ document.getElementById("overlay").classList.remove("on"); }
function flashModal(t){ const s=document.getElementById("mSub"); const o=s.textContent; s.textContent=t; setTimeout(()=>s.textContent=o,1500); }
function printCard(){
  if(!modalDataURL) return;
  const w=window.open("","_blank");
  if(!w){ alert("Your browser blocked the print pop-up. Allow pop-ups for this site and try again."); return; }
  w.document.write(`<html><head><title>Print</title><style>
    @page{size:A6 landscape;margin:0}
    html,body{margin:0;padding:0}
    img{width:148mm;height:105mm;object-fit:contain;display:block}
  </style></head><body><img src="${modalDataURL}" onload="setTimeout(()=>{print();},150)"></body></html>`);
  w.document.close();
}

/* ============ utils ============ */
function esc(s){ return String(s??"").replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function escJs(s){ return String(s??"").replace(/\\/g,"\\\\").replace(/'/g,"\\'"); }
function fmtMRP(r){
  if(r===undefined||r===null||r==="") return "";
  const s=String(r).trim();
  return /^[\d.,]+$/.test(s) ? "₹"+s : s;
}
